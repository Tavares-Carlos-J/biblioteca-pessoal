lemas surgem, entre tubarões a resposta a se fazer? Nada Confiei naquela linda sereia, tal erro me trouxe aflição e ira Não confio em vida marinha mais, não depois dessa traíra","rating":7.41},{"title":"Trindade","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-trindade.html","date":"2026-05-13","text":"Trindade, Trindade santa e perfeita Não existe mais, falecida mal feita Não há mais pai ou paz no país, O filho solitário, e não feliz E esse tal de espírito santo Ele que era pra tá em todo o canto Era pra nos proteger como o manto Mas hoje é nele há um vazio e tanto Oremos hoje ao pai, filho e espírito santo, por nostalgia do sentimento brando Pois o pai é saudade O filho é maldade O espírito santo é uma ceguidade, aos que querem caridade","rating":5.12},{"title":"Tutorial da autodestruição","author":"Epaminondas Brasa Bela","href":"poesias/epaminondas-brasa-bela-tutorial-da-autodestruicao.html","date":"2026-05-13","text":"Se você quer se destruir aqui vai um passo a passo Pois eis aqui o guia definitivo de como ter um colapso Durma sete horas por dia pois este é o número ideal Ao acordar medite e veja um vídeo motivacional Trabalhe enquanto festejam festa é coisa de perdedor Trabalhe mais em seu negócio não há ganho sem a dor Leia diversos livros, foque sempre em quantidade Não algo que goste, procure sempre o que diga a verdade Aprenda a ser produtivo com quem nunca produziu nada Compre curso de quem enriqueceu de maneira muito errada Se fez isso e não deu certo é simples, a culpa é sua Pra correr atrás tire duas horas de sono e beba café em dose dupla Se for introvertido, MUDE, algum líder era introvertido? Se for extrovertido, MUDE, algum gênio era extrovertido? Estude política pela Internet tome lado e lute nessa guerra semântica Estude também oque não te interessa principalmente física quântica Não peça comida não gaste atoa seu dinheiro Não gaste tempo cozinhando tempo é dinheiro Não coma comida enlatada faz mal Coma carne, vegetal, vitaminas e seja natural Saia de todas redes sociais, é um lugar para acéfalos de vidas pequenas Volte para elas, gênios e famosos sempre tem contas nelas Troque uma hora de sono por mais trabalho e jogue se sucesso na cara de todos Não ligue ao que falam de ti não se importe com os outros Se não deu é culpa sua que não atraiu boa energia, pois existe a lei da atração Se está aqui é especial pois na corrida da vida foi o grande campeão Mas se precisar de lembrar de uma coisa leve esse conselho pra vida Nunca se contradiga, sempre entenda ironia E se ainda sim sua vida tá no abismo Bom, já ouviu falar de nilismo?","rating":7.13},{"title":"Um breve dizer de um fantasma","author":"Zaquel Brito","href":"poesias/zaquel-brito-um-breve-dizer-de-um-fantasma.html","date":"2026-05-13","text":"Beijei, beijei sem pensar Amei, amei sem pesar Causei, tudo que não quis causar Chorei, tudo que poderia chorar E depois, não piso mais naquela casa Traumatizei então a minha amada E nem quis, péssima vida de fantasma","rating":7.12},{"title":"Um dia...","author":"Celina Brito","href":"poesias/celina-brito-um-dia.html","date":"2026-05-13","text":"Quem sabe um dia... Eu saiba o que não posso saber, Quem sabe um dia... Eu seja o que não serei, mas o que quero ser Quem sabe... Um dia.... Talvez eu viva! E não viva mais querendo viver","rating":7.88},{"title":"Um soneto a deusa de um poeta.","author":"Antúrio Brito","href":"poesias/anturio-brito-um-soneto-a-deusa-de-um-poeta-1.html","date":"2026-05-13","text":"Um soneto a deusa de um poeta Ó nume, deidade, ao qual é rainha, senhora de minha devoção, Vós que monopoliza minha teologia, minha aposteoseção, Esbelta, um anjo em forma humana, após sua transfiguração, Fez meu celular hierofante, toda vez que transmite parte de ti, Pois em áudios, tua voz verte em mim terna consolação, Em fotos, tua forma irradia celeste e pura exaltação, E em letras, tua fala me rege em doce e íntima instrução, Fazendo de cada vestígio teu a origem do bem que em mim condiz. Minha total serendipidade, que exorcisa minha racionalidade, Pois faz-me conceber a infinidade, amando vossa divindade, Ajoelho-me a imaterialidade do sentimento em que sucumbi Espero então que seja eterno, não um simples e rápido já Um amor inacabável que se ti quiser, nunca se findará, Pois é tu, a maior experiência de vida ao qual já vivi","rating":8.97},{"title":"Uma estrofe a deusa de um poeta (II)","author":"Antúrio Brito","href":"poesias/anturio-brito-uma-estrofe-a-deusa-de-um-poeta-ii.html","date":"2026-05-13","text":"E naquele momento que tudo era trevas, teu sorriso me foi luz, Naquele momento que tudo foi tristeza, alegrou-me lhe ter, Naquele momento em que a ansiedade me dominou, tu me salvaste Naquele momento que não pensava em amor, eu te amei","rating":7.96},{"title":"Uma estrofe a deusa de um poeta (III)","author":"Antúrio Brito","href":"poesias/anturio-brito-uma-estrofe-a-deusa-de-um-poeta-iii.html","date":"2026-05-13","text":"E estava mal, atrás de um consolo, um abraço, algo nosso, Estava lhe querendo, e na falta de nós, vi do passado uma linda foto, Em que estava vós em alta pulcritude, asseiando meu coração, Logo então fiquei bem, graças a deusa de minha purificação.","rating":7.98},{"title":"Uma estrofe a deusa de um poeta (IV)","author":"Antúrio Brito","href":"poesias/anturio-brito-uma-estrofe-a-deusa-de-um-poeta-iv.html","date":"2026-05-13","text":"O anseio de descrever-te, em exuberância e perfeição. Limitou-me a tentar e só tentar, fazer tal ode, a minha paixão, Pois dedico-me, mas falta o vocábulo, de dizer minha veneração A essa bela deusa, que amo, equilibro pulcro com tentação","rating":8.09},{"title":"Uma estrofe a deusa de um poeta (I)","author":"Antúrio Brito","href":"poesias/anturio-brito-uma-estrofe-a-deusa-de-um-poeta.html","date":"2026-05-13","text":"E apesar de ateu, me colocaste em apoteose, Deusa, vós deixou-me em modo de hipnose, Fez-me olhar o amanhã, contra toda prognose, Dissipou-me as sombras, limpou minha mente substituindo por beleza, exterminando a neurose.","rating":7.88},{"title":"Viciei-me","author":"Celina Brito","href":"poesias/celina-brito-viciei-me.html","date":"2026-05-13","text":"Viciei-me, e contra isso não a nada que eu diria Viciei-me, e vou a boca em busca de calmaria Viciei-me, ao olhá-la alucinei e agora meus olhos mostram o outro sentido Viciei-me, no beijo da linda dona de tudo, e o sal das lágrimas hoje trafico","rating":7.77},{"title":"Vida e Morte","author":"Epaminondas Brasa Bela","href":"poesias/epaminondas-brasa-bela-vida-e-morte.html","date":"2026-05-13","text":"(Vida) Eu te conheço muito bem, por isso é difícil te dizer na sua frente Sei que aqui nós não andamos muito bem ultimamente E sinceramente sei que no fundo tu só qquiseres meu fim Só que por favor não desista de mim Sei que te causei dores, traumas, cicatrizes e vícios Não te julgo por você me odiar, sou difícil Mas sou oque somos, e tentarei não ser mais assim Então por favor não desista de mim Sei de todos os momentos que orou pro meu fim Sei que sou má as vezes, mas pra mim diga sim! Sim pro nosso futuro seja ele bom ou ruim E por favor não desista de mim Vê a desistência como opção mas nem é tão verdade Analise e veja que em mim há sim felicidade Sei que choraste muito, de tanto perdeste a voz Mas por favor, não desista de nós Eu sei que consegue, e vejo em ti que é forte Bom, tanto eu quanto a... (Morte) *Morte! Muitos me conhecem por cortes Muitos tentam me ver se jogando sem suporte Dizem que quem me conhece não tem sorte Já quem escolheu me conhecer eu vejo que é forte Mas por favor desista de mim Não sou inconveniente, só sigo o que orquestra Cada indivíduo tem um tempo, não acabo com festa Aproveite, em falta de porta aberta, passe pela fresta Eu sou uma fechadura escura, sua vida é a chave mestra Por isso por favor desista de mim Eu sou inevitável, tal qual o tal thanos Várias almas vagando assim como tanto Já me representaram, para alguns eu sou thanatos Sou medo de vários e sonho de alguns Só que por favor, desista de mim Sou o ruim, faço de você um luto eterno Tal qual meu contraponto sou um ser terno Virei a todos e como a vida faço com que o povo chore Por isso, por favor! Desista de mim Se a vida faz sentido, a morte é ele Não conheça o vazio que o assemelhe Então morra de mim e viva dele! Então desista de mim, e viva dele! (Vida) E se a vida tá difícil vai passar, não procure a morte (Morte) Viva dele e fuja de mim, mas nunca nos ignore","rating":6.98},{"title":"Você","author":"Celina Brito","href":"poesias/celina-brito-voce.html","date":"2026-05-13","text":"Amor é a conquista da união Paixão é a vivência da carne Você, é a lembrança que eu não posso ter tudo","rating":8.01},{"title":"Vontade","author":"Celina Brito","href":"poesias/celina-brito-vontade.html","date":"2026-05-13","text":"E aquela vontade, me consumia de muito em muito, até eu ter muita muita vontade de menos!","rating":6.01}];
    document.querySelector('#poem-count').textContent = poems.length;
    const results = document.querySelector('#poem-results');
    const keywordSearch = document.querySelector('#keyword-search');
    const titleSearch = document.querySelector('#title-search');
    const orderButtons = [...document.querySelectorAll('.order-option')];
    const authorSortToggle = document.querySelector('.suborder-toggle');
    const authorSortMenu = document.querySelector('.suborder-menu');
    const authorSortButtons = [...document.querySelectorAll('.suborder-option')];
    let currentView = 'authors';
    let currentAuthorSort = 'abc';

    const collator = new Intl.Collator('pt-BR', { sensitivity: 'base' });
    const monthNames = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];

    function normalizeText(value) {
      return value.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function sortKey(value) {
      return normalizeText(value).replace(/[^a-z0-9]+/g, ' ').trim();
    }

    function sortByTitle(items) {
      return [...items].sort((a, b) => collator.compare(sortKey(a.title), sortKey(b.title)) || collator.compare(a.title, b.title));
    }

    function groupBy(items, getKey) {
      return items.reduce((groups, item) => {
        const key = getKey(item);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
        return groups;
      }, new Map());
    }

    function formatDate(dateValue) {
      const [year, month, day] = dateValue.split('-');
      return day + '/' + month + '/' + year;
    }

    function formatRating(value) {
      return Number(value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function poemLink(poem, large = false, showDate = false, showRating = false) {
      const date = showDate ? '<time class="poem-release-date" datetime="' + poem.date + '">' + formatDate(poem.date) + '</time>' : '';
      const rating = showRating ? '<span class="poem-rating">' + formatRating(poem.rating) + '</span>' : '';
      return '<li><a class="' + (large ? 'large-poem-link' : '') + '" href="' + poem.href + '"><span>' + poem.title + '</span>' + date + rating + '</a></li>';
    }

    function renderGroup(title, items, large = false, showDate = false, showRating = false) {
      return '<section class="author-block"><h2 class="group-heading"><span>' + title + '</span><span class="group-count">' + items.length + '</span></h2><ul class="poem-list ' + (large ? 'poem-list-large' : '') + (showDate || showRating ? ' poem-list-dated' : '') + '">' + items.map((poem) => poemLink(poem, large, showDate, showRating)).join('') + '</ul></section>';
    }

    function filteredPoems() {
      const keyword = normalizeText(keywordSearch.value.trim());
      const title = normalizeText(titleSearch.value.trim());
      return poems.filter((poem) => {
        const matchesKeyword = !keyword || normalizeText(poem.text).includes(keyword);
        const matchesTitle = !title || normalizeText(poem.title).includes(title);
        return matchesKeyword && matchesTitle;
      });
    }

    function renderSearch(items) {
      const sorted = sortByTitle(items);
      if (!sorted.length) {
        results.innerHTML = '<p class="empty-state">Nenhum poema encontrado para essa busca.</p>';
        return;
      }
      results.innerHTML = renderGroup('Resultados', sorted, true);
    }

    function renderAuthors(items) {
      const groups = groupBy(items, (poem) => poem.author);
      const authors = [...groups.keys()].sort((a, b) => collator.compare(a, b));
      results.innerHTML = authors.map((author) => renderGroup(author, sortAuthorGroup(groups.get(author)))).join('');
    }

    function sortAuthorGroup(items) {
      if (currentAuthorSort === 'date') {
        return [...items].sort((a, b) => {
          const byDate = new Date(b.date) - new Date(a.date);
          return byDate || collator.compare(sortKey(a.title), sortKey(b.title)) || collator.compare(a.title, b.title);
        });
      }
      if (currentAuthorSort === 'rating') {
        return sortByRating(items);
      }
      return sortByTitle(items);
    }

    function renderAlphabetical(items) {
      const sorted = sortByTitle(items);
      const groups = groupBy(sorted, (poem) => {
        const first = sortKey(poem.title).match(/[a-z0-9]/);
        return first ? first[0].toUpperCase() : '#';
      });
      const letters = [...groups.keys()].sort((a, b) => collator.compare(a, b));
      results.innerHTML = letters.map((letter) => renderGroup(letter, groups.get(letter), true)).join('');
    }

    function releaseLabel(dateValue) {
      const date = new Date(dateValue + 'T00:00:00');
      return monthNames[date.getMonth()] + '/' + String(date.getFullYear()).slice(-2);
    }

    function sortByRating(items) {
      return [...items].sort((a, b) => {
        const byRating = Number(b.rating || 0) - Number(a.rating || 0);
        return byRating || collator.compare(sortKey(a.title), sortKey(b.title)) || collator.compare(a.title, b.title);
      });
    }

    function renderRelease(items) {
      const sorted = [...items].sort((a, b) => {
        const byDate = new Date(b.date) - new Date(a.date);
        return byDate || collator.compare(sortKey(a.title), sortKey(b.title)) || collator.compare(a.title, b.title);
      });
      const groups = groupBy(sorted, (poem) => releaseLabel(poem.date));
      results.innerHTML = [...groups.entries()].map(([label, group]) => renderGroup(label, group, true, true)).join('');
    }

    function renderRating(items) {
      const sorted = sortByRating(items);
      const groups = groupBy(sorted, (poem) => String(Math.floor(Number(poem.rating || 0))));
      const labels = [...groups.keys()].sort((a, b) => Number(b) - Number(a));
      results.innerHTML = labels.map((label) => renderGroup(label, groups.get(label), true, false, true)).join('');
    }

    function render() {
      const items = filteredPoems();
      const searching = keywordSearch.value.trim() || titleSearch.value.trim();
      if (searching) {
        renderSearch(items);
        return;
      }
      if (currentView === 'alphabetical') renderAlphabetical(items);
      else if (currentView === 'release') renderRelease(items);
      else if (currentView === 'rating') renderRating(items);
      else renderAuthors(items);
    }

    keywordSearch.addEventListener('input', render);
    titleSearch.addEventListener('input', render);
    orderButtons.forEach((button) => {
      button.addEventListener('click', () => {
        currentView = button.dataset.view;
        orderButtons.forEach((item) => item.classList.toggle('active', item === button));
        render();
      });
    });

    authorSortToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      const isOpen = authorSortMenu.classList.toggle('open');
      authorSortToggle.setAttribute('aria-expanded', String(isOpen));
    });

    authorSortButtons.forEach((button) => {
      button.addEventListener('click', (event) => {
        event.stopPropagation();
        currentAuthorSort = button.dataset.authorSort;
        authorSortButtons.forEach((item) => item.classList.toggle('active', item === button));
        currentView = 'authors';
        orderButtons.forEach((item) => item.classList.toggle('active', item.dataset.view === 'authors'));
        authorSortMenu.classList.remove('open');
        authorSortToggle.setAttribute('aria-expanded', 'false');
        render();
      });
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.authors-order-control')) {
        authorSortMenu.classList.remove('open');
        authorSortToggle.setAttribute('aria-expanded', 'false');
      }
    });

    render();
  </script>
</body>
</html>
