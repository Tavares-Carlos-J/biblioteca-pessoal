  <script>
    const poems = [{"title":"O Cântico do Mortal","author":"Antúrio Brito","href":"poesias/anturio-brito-o-cantico-do-mortal.html","date":"2026-05-13","text":"(À minha deusa, que partiu…) À minha deusa, que partiu, partiu pra sempre Tu eras luz, minha deusa, e o mundo ardia Ao tênue sopro do teu breve olhar, Mas foste aurora em cruel agonia, Promessa vã que nasceu pra findar. Nos véus do sonho, eu via teu semblante Brilhar mais puro que os astros do céu, Mas o amor — esse engano delirante — Roubou-me o riso e deixou-me o escarcéu. Tua voz, que outrora embalava os ventos, Hoje ecoa em prantos no abismo em mim. Foste altar de todos os meus tormentos, Fui mártir — e fui tolo, até o fim. Minha deusa... oh, quanto eu te bendigo Por ter sido de carne, e não etéreo ser! Pois se fosse imortal, estaria contigo No eterno suplício de te perder. A morte, essa amante de olhos gentis, Um dia há de calar minha canção. E, livre então dos tormentos sutis, Desfarei teu nome em minha mão. Que a eternidade, em seu trono gelado, Te cele como estrela a fulgurar — Mas eu, homem de dor, de pó moldado, Agradeço poder, enfim, te olvidar.","rating":6.02},{"title":"A barafunda do lar","author":"Lizianto Brito","href":"poesias/lizianto-brito-a-barafunda-do-lar.html","date":"2026-05-13","text":"Meu quarto escuro bagunçado Meu cérebro também desarrumado Coitado! Que mal hábito Péssimo cativeiro ao espírito alado Mas não voa tá preso E então ligo a luz do quarto E logo me arrependo, vejo ele desorganizado E embaixo (as)sombra o pesadelo passado Minha amuada vida, foste como um traço Traço de tolo, conformado e ameno Minha alma, e traumas habitam o mesmo espaço Vejo meus sonhos com a adaga da vida mato Fujo de mim e a felicidade eu ainda caço Infeliz eu sigo em frente a meu último ato E segue a bagunça que eu estou vivendo","rating":6.51},{"title":"A bunda","author":"Azaleia Brito","href":"poesias/azaleia-brito-a-bunda.html","date":"2026-05-13","text":"Estava em um quarto escuro da minha mente Inacessível, obscuro, mórbido dormente Até que surge um brilho que toma a atenção Iluminava-me, o reflexo parou minha reflexão Então olhei o que brilhava, e veio a surpresa Uma bunda que esbanjava, airosidade e beleza Não possuo adjetivos, sei que eu rebaixarei Pois falta-me vocabulário, adjetivos? Não sei! Ela era clara, alvescente, prefulgente, rutilante Ela era linda, estupenda, perfeita, deslumbrante Ela era farta, volumosa, gigante, saliente Era excitante, afrodisíaca, libidinosa, seduzente E naquela hora a perfeição pude ver Não posso dizer o que pensei fazer De tão perverso, que iriam me prender Então respirei, e segui a apenas viver","rating":7.46},{"title":"A dislalia do meu amar","author":"Azaleia Brito","href":"poesias/azaleia-brito-a-dislalia-do-meu-amar.html","date":"2026-05-13","text":"Já fiz ode ao meu amor, e hoje faço ao meu amar, Puro e autêntico faz oque quer sem hesitar, Tão corajoso, não tem vergonha de sonhar muito menos de tentar Se declara sem ao menos cogitar oque os outros vão pensar Ele que assim como cebolinha trocou o R pelo L e desfez da arma e se fez de alma Ele que não deixou eu prender a minha vida e amarrá-la, me fez forte e amá-la Antes sem tal, de chorar tinha a garganta rouca, hoje de felicidade minha mente está louca Louca, louquinha, louquíssima, não penso mais em pontes e caminhões ou me jogar na rua, sonho alto tal qual no céu a lua","rating":4.64},{"title":"A menina com a letra H","author":"Azaleia Brito","href":"poesias/azaleia-brito-a-menina-com-a-letra-h.html","date":"2026-05-13","text":"Me perguntaram, \"o que aconteceu com a menina que começava com a letra H, aquela do nome estranho e sorriso contagiante\" Não sei, não conheci ou se vi não lembro, juro que não sei de quem dizes. E quando me perguntaram \"o que fez pra mim a menina que tinha as pontas do cabelo azul ciano\" Nada! Não sei quem é e se soubesse não teria feito nada, se disserem que eu já estive com ela mentiram. Se disserem que pareciamos bem juntos na praça perguntando \"quem é ela?\" Nem sabiá que pra lá tinha praça, não saio de casa juro, só fico no meu quarto é engano. Quando me disse \"vocês são um belo casal porque não me contou dela\" Dela quem? Parece ser alguém divertido mas não foi eu talvez um gêmeo perdido ou um clone, mas não eu. E se perguntarem como esquecer aquele sorriso, eu também queria saber.","rating":7.88},{"title":"A NOTA","author":"Ricardo Ravencourt","href":"poesias/ricardo-ravencourt-a-nota.html","date":"2026-05-13","text":"Era um fim de tarde, que de tão comum estranhava Era um aluno sem classe, e de nota ele precisava Era um professor qualquer, que no seu tempo pensava Uma solução simples, o aluno por dó então passava","rating":6.03},{"title":"A Pílula","author":"Lizianto Brito","href":"poesias/lizianto-brito-a-pilula.html","date":"2026-05-13","text":"Tento me controlar, tento não me exceder, Mas se vivo já não estou, isso faço pra sobreviver Esse é o remédio que irá me ajudar, à minha mente não concretizar louca Essa é a pílula que me concentará, pois é ela que me fará ter força Mas se ela não me ajuda, em algum momento me controla A pílula em meu cérebro, e minha consciência está lá fora Já não controlo minha mente, já não controlo minha boca Só mais um, só mais vários, só mais esse, só mais outra E quando tomo, só consigo sentir o não sentimento Sinto minha visão enturvecer, a mudança de batimento Já não mais me sou dono, a pílula me fez escravo Mas entre dor e nada sigo assim, vivo, mas viciado","rating":7.17},{"title":"A verdade","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-a-verdade.html","date":"2026-05-13","text":"Sabe, na verdade é que eu nunca fui forte. Apenas temia ser fraco. A verdade é que nunca fui rápido. Apenas temia ser lento demais. Na verdade nunca fui malandro. Apenas temia ser lerdo. A verdade é que nunca fui esperto. apenas temia me acharem burro. E a verdade é que nunca fui burro. Apenas temia me acharem chato. Nunca fui direito. E se fosse nem seria eu Na verdade nunca fui profundo. Pois temia que vissem meus cortes. A verdade é que nunca fui eu. Apenas temia me acharem estranho. Então me desculpa se eu não fui verdadeiro. Eu temia a sua rejeição. E na verdade, nunca foram os outros, apenas temi ver quem eu sou.","rating":6.89},{"title":"Admirador encalistado","author":"Flávio","href":"poesias/flavio-admirador-encalistado.html","date":"2026-05-13","text":"De tanto a te falar não sei oque dizer a ti nessa carta Já escrevi mais de mil porém saber que essa será enviada dói Por que significa que tomei uma decisão, e isso me corrói Pra fazer jus a minha vida eu farei um ato covarde e não seguirei aqui Mas algo me diz que deves saber oque eu senti por ti Então aqui vai o acervo de tentativas de um encalistado de declarar oque vivi É escolha sua ler ou não, então aqui me dispeço.","rating":7.32},{"title":"Alter ego","author":"Lizianto Brito","href":"poesias/lizianto-brito-alter-ego.html","date":"2026-05-13","text":"Tenho vários alter ego, pra minha vida sou cego, honestamente infeliz, então a verdade nego Já criei outros eu, me perdi em sonhos infinitos Mas a lágrima me acorda, pros pesadelos íntimos Tão triste minha situação, vivo vidas de mentiras, e nelas ainda há confusão Então lhe questiono, o que adianta fugir da realidade? Se em minhas tristes vidas a tristeza é verdade","rating":7.23},{"title":"Amo-te, mas...","author":"Flávio","href":"poesias/flavio-te-amo.html","date":"2026-05-13","text":"Olá, desculpe por não ter te dito no cara a cara Mas eu tenho uma mensagem muito clara Eu queria dizer que... Bom, até escrever é difícil, mas queria que soubesse o que sinto Só de pensar em me expressar na pareço ridículo Mas eu na verdade... Desculpa por todo constrangimento causado Desculpa por todo o perdão não falado É que... Sinceramente, não tenho certeza ainda se...","rating":7.14},{"title":"Amor botânico","author":"Antúrio Brito","href":"poesias/anturio-brito-amor-botanico.html","date":"2026-05-13","text":"Ó minha amada, te dedico essas rosas Em homenagem a sua sedução airosa Meu amor hoje te dei uma margarida Para realçar a sua brilhosidade infinita Ó meu anjo te trago uma linda jásmim Que brilha como você e só Serafins Linda moça, te trouxe um crisântemo Para que lembre o que somos e temos Olá te trago um lírio que diz renovação Para realçar em nós aquele paixão Pra curar a ti lhe trago um bálsamo Pra tratar o relacionamento ágamo E de tantas plantas fizeste o jardim. E enterrou o amor ignorando a mim","rating":6.98},{"title":"Amor do século","author":"Azaleia Brito","href":"poesias/azaleia-brito-amor-do-seculo-1.html","date":"2026-05-13","text":"Amor do século Não sei se amar é pecado Se for, que eu seja encarcerada Pelo meu príncipe encantado Que me fez por ti encantada Sem ouvir tua voz, mas pelo dom de sua palavra Sem ver tua face, mas pela divina beleza que exala Sem olhar teu olho, mas pelo brilho de sua alma","rating":6.76},{"title":"Amor eterno","author":"Antúrio Brito","href":"poesias/anturio-brito-amor-eterno.html","date":"2026-05-13","text":"E começou milênios atrás, e tive a pior maldição pensável Amar e não ser amado, dor infinita e inimaginável E com um grito de socorro tudo é acabado, foi o único modo viável Mas da corda em meu pescoço surge um cordão umbilical Acordei de novo? Esse sofrimento é eternal? Não entendi nada e não consegui raciocinar Respirei a vida, e por ela só pude chorar E a história de novo, de novo e de novo se renovava Taxado de louco, toda santa vez que eu falava Mas em todas as vidas, a maldição total continuava Amei a mesma menina, mas ela nunca me amava De primeira fui ignorado, apenas um louco, não fui lembrado. Sabiá ser ela, o jeito, o brilho, mas eu sempre fui ignorado Ela não lembrava, minha memória me fez amaldiçoado Mudava etnia, mas não a beleza, mudou a voz, mas não o ódio nem precisou falar Disse a ela ser o louco que a amou no Egito, riu de mim, não sabiá do antigo Após isso falei que a amei em Portugal, nem me conhecia e menos ainda o local Em meio a Guerra, a amei na vida americana, mas fria era ela, minha dor é mundana Atravessei oceanos de tempo pra encontrá-la Mas em todas as vidas, apenas um louco que amava","rating":6.52},{"title":"Amor fati","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-amor-fati.html","date":"2026-05-13","text":"Eu não consigo entender o que vejo Nem ao menos sei se entendo algo Pois também não vejo oque entendo Vejo-me néscio e isso tem me matado Na procura do amor me vejo inapto Eu em um precipício, um grande hiato Já blasfemei contra mim e o passado De luto pelo estudo, desamparado Nem se quer me concentro, quem dirá ser alguém erudito Pois no fim meu modo caipira me domina e me deixa iludido Da ilusão aurifúlgida de tentar ser melhor que sou, um energumego de um sentimento rúbido","rating":6.54},{"title":"Ateu","author":"Antúrio Brito","href":"poesias/anturio-brito-ateu.html","date":"2026-05-13","text":"Desculpe se eu ainda não te enviei nenhum poema que escrevi pra você; Desculpe se eu não digo que te amo, não expresso tudo que eu sinto; Mas eu sou ateu de você; Não consigo acreditar que o que você diz realmente é verdade; Não me leve a mal, eu sei que isso é rude de minha parte; Mas eu sou ateu de você; Sei que não deveria te julgar assim, já fui machucado, e desconto em ti; Já acreditei em deusas, você aparece e me faz viver o que jamais vivi; Mas eu sou ateu de você; E embora não fizeste nada, minha mente sempre grita VAZA; Pois embora seja perfeita, algo em mim diz você é paixão que mata; E por isso sou ateu de você.","rating":8.52},{"title":"Auge","author":"Lizianto Brito","href":"poesias/lizianto-brito-auge.html","date":"2026-05-13","text":"Tava triste como sempre, mas decidi festejar Beijei e não senti, nem sei realmente amar Bebi, fumei, cheirei, senti o que dava, Meu corpo sorria, a mente sonhava Voltei feliz pra casa, estava no topo do mundo Joguei me enforcando, acabei com tudo E tal qual um jogador que se aposenta no auge Morri feliz, diferente da vida de fraude","rating":8.66},{"title":"Azul","author":"Azaleia Brito","href":"poesias/azaleia-brito-azul.html","date":"2026-05-13","text":"Vivemos no planeta azul, onde existe o azul do mar, o azul do céu, o azul das hortênsias, da papoula-do-Himalaia, das lavandas, do lírio-do-Nilo e de todas as flores azuis que não conheço; planeta onde existe o azul das borboletas que têm bom gosto, das obras de artistas que têm bom gosto; o azul da tampa da caneta BIC que sumiu há três meses; o azul do jeans que a mulher que passou por nós usava; o azul de olhos não tão bonitos quanto o seu olho verde — que, inclusive, merece um poema à parte; o azul da partezinha de plástico dos talheres da casa da minha avó, que você ainda nem conheceu; o azul que está nas taças, xícaras, pires da minha outra avó, que você também não conheceu; o azul do carro antigo da minha mãe; o azul da camisa daquele time que perdeu na primeira fase do interclasse; o azul do time que perdeu a final do campeonato mais importante, mas também o azul do time que ganhou o mesmo campeonato; o azul do vestido de formatura que aquela sua ex-amiga usou e de que você nem deve se lembrar; o azul do tênis desconfortável que a escola nos deu como uniforme; o azul da caixa daquele remédio que me faz dormir; o azul da colônia da natura que eu usei no dia do nosso primeiro beijo; beijo esse que foi em um dia que se pudesse ser definido em uma cor, seria azul se é que isso faz sentido; o azul do cobertor azul que eu uso e que já está rasgado; o azul do cordão da medalha de ouro que ganhei no campeonato de matemática lá do fundamental; o azul do meu livro com brilhozinho de O Pequeno Príncipe. Mas, de todos os tons de azul existentes, a mecha azul do seu cabelo foi o que me fez apaixonar por essa cor.","rating":8.75},{"title":"Beldade divina","author":"Flávio","href":"poesias/flavio-beldade-divina.html","date":"2026-05-13","text":"Festa na piscina, querendo divertir quis se vingar Mostraste oque foi perdido quis se amostrar Foi de longe a mais chamativa Em todos foste a chama ativa E saiu daquele vestiário com alegria fúlgida E E N T Ã O TUDO PAROU! TUDO! O sol parou pra te olhar Os pássaros cantaram a ti elogiar Meu olho fixou a te apreciar Nunca vi sua carne de modo tão predatório Mas o momento me fez caçador Nunca percebi que cresceste tanto Mas vi que gigante mesmo apenas meu calor Perfeita composição Me fez de atração Só pode ser ilusão Além da compreensão Parou meu coração Roubou a atenção Pois... Especial tu foste e na cabeça, voava a imaginação De em ti deixar amor, e de amores fazer coleção Libar de teu sumo, degustar de tua quintecência E ó minha potestade, perdoe a minha indecência De almejar ti como amante mesmo sendo mortal E ainda basilarmente interdito de tal ação carnal Então me rendo ao abismo entre nossas classes E contento-me a minha donzela embora o coração me aguilhoasse Maldição, você é minha riqueza, mas eu preso a penúria Mas em verdade... a minha condenação é justa pelo meu pecado de luxúria","rating":6.88},{"title":"Bobo da Corte","author":"Epaminondas Brasa Bela","href":"poesias/epaminondas-brasa-bela-bobo-da-corte.html","date":"2026-05-13","text":"Como eu foste tão indisplicente? Criaste uma piada, tal piada me fez doente Imitaste Monty Python, por uma ironia total Me matei, a causa? Uma piada mortal. Olho o atrás e arrependimento é oque tenho visto Me vem uma dúvida, porque eu fizeste isso? Comédia existe devido ao exagero Exagerei oque sentia, ri, sem o mínimo de esmero Até porque cuidado comigo é algo inexistente Desde sempre assim, como esteve tão indiferente? Não culpe os outros, você sabe onde estava se metendo Traumas? Medo? Achaste, mesmo que ainda fique escondendo","rating":7.13},{"title":"Bobo da morte","author":"Epaminondas Brasa Bela","href":"poesias/epaminondas-brasa-bela-bobo-da-morte.html","date":"2026-05-13","text":"Uma piada, és um palhaço, E da morte, és escravo. Da própria vida é um estorvo, Não vives, tá morto Não tens alma, apenas corpo Vives cinza, tudo morno De tão horrendo, chega a ser engraçado Não aos meus olhos, aos do excomungado Pois é quem de cima tem lhe observado; E caso quisesse, teria lhe matado Não fez por graça dessa vida banida, por lhe julgar não forte Porque tu abriste mão da vida, e viraste o bobo da morte","rating":6.47},{"title":"Cacto e a rosa","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-cacto-e-a-rosa.html","date":"2026-05-13","text":"Nessa dia quente, me vi em um deserto Nessa noite fria, percebi estar descoberto Olhei ao redor, e me senti um cacto Por medo de me envolver por fora, intacto Mas por dentro eu era a única fonte de água E mesmo podendo ajudar, não fiz por mágoa Até que um dia te vi, nesse grande deserto do Saara É você a flor linda do meu dia a flor que me sara Esse sol árido me fez Solitário você, me fez solidário Dei a primeira gota pra ti em todo esse calendário Pra ti, dei a primeira gota de vida E só pra tu, minha linda margarida Pois foi a única que viu o meu interior Só tu sabiá que em baixo dos espinhos, havia amor E talvez por isso todo o meu delírio Por ter te visto, a mais linda dos lírios Hoje em dia, sou um cacto enfeitado Desejado, mas só você é quem tenho amado E é pra ti, o minha bela rosa, Pra ti quem dedico todos os meus versos e prosa","rating":7.12},{"title":"Carta a genitores","author":"Lizianto Brito","href":"poesias/lizianto-brito-uma-carta-futura-pra-quando-voltarem-ao-passado.html","date":"2026-05-13","text":"Assunto: Uma carta futura pra quando voltarem ao passado Destinatário: Meu Pai, Mãe, ou qualquer borboleta que no passado altere meu presente Mãe, Pai Quando eu estiver no meu quarto escuro, não abram a porta Quando eu estiver no fundo do poço não tentem jogar corda E quando eu tiver querendo a morte não me deem a vida","rating":9.02},{"title":"Ciclos","author":"Lizianto Brito","href":"poesias/lizianto-brito-ciclos.html","date":"2026-05-13","text":"Entre o sofro e amar, o fado de um mal cíclico, Destinado a continuar e viver o maldito. Retornar a escuridão, sem riso ou proveito, Magnífica solidão, em mim o equilíbrio perfeito. Passou-se horas, de tantas que quase infinitas, Amou-lhe drogas, interino a prisão fictícia. Vícios amados; sentidos negados; soluços parados; risos engasgados; por si julgado; vivendo o passado; sonhos, não fato; vazio, de tão lotado; Fostes deixado. Proibido de respirar Mas confie que pode relaxar Apesar de tudo, de não conseguir se amar É só uma nuvem de chuva que vai passar","rating":6.97},{"title":"Como sempre","author":"Azaleia Brito","href":"poesias/azaleia-brito-como-sempre.html","date":"2026-05-13","text":"Querendo, ou não Estarei aqui como sempre Amando, ou não Estarei aqui como sempre Sofrendo, ou não Estarei aqui como sempre Desejando, ou não Estarei aqui como sempre Vivo ou não Estarei pra ti, como sempre","rating":6.23},{"title":"Conjugação de erros","author":"Celina Brito","href":"poesias/celina-brito-conjugacao-de-erros.html","date":"2026-05-13","text":"Fugir do Futuro sempre pensando no passado é um sintoma claro de quem tem por infinitivo um, presente imperfeito","rating":6.46},{"title":"Culpa de quem...","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-culpa-de-quem.html","date":"2026-05-13","text":"Sempre que eu penso sobre, há alguém pior que eu De um lado alivia, mas por outro ninguém aprendeu Hoje vejo que a culpa é toda minha, simples assim Se eu tô desse jeito, não a ninguém errado além de mim Os meus erros são ajudantes, no que posso melhorar meu ser, O fracasso ao meu redor só eu posso resolver, Se eu me fodi a culpa é minha por errar, Já se você me fodeu a culpa é minha por em você confiar Demorei muito pra me atribuir ao meu fracasso, Não continuarei mais com tal erro craso Apenas ficarei correndo atrás de mim pra tirar o atraso","rating":6.27},{"title":"Deixou-me, mas seguirei a ti","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-ela-me-deixou-apos-3-anos-7-meses-e-2-dias-que-moravamos-juntos-ela-me-deixou.html","date":"2026-05-13","text":"Ela me deixou após 3 anos 7 meses e 2 dias que morávamos juntos, e ela me deixou Ela me deixou. E além de saudade... Tudo que me deixou foi uma carta Uma mera carta Nela você disse que não aguentava mais, foi pro norte, lá no Caribe curtir, pois lá o sol batia diferente, o céu era mais bonito. Você foi e tudo que me deixou foi uma carta, mas em dois dias achei seu diário, não abri. Não até ter certeza que você não voltaria, após duas semanas de você ter ido foi quando a ficha caiu, tirei aquele leite integral da geladeira junto com os ovos daquela sua dieta, e tomei coragem pra saber oque tinha escrito no seu diário É estranho ver você criticando a sua mãe pois após sua partida, ela pareceu ser a única que me entendia, ela tentava não te sufocar, eu tentava não te sufocar, tentávamos te ajudar com seu espaço, mas nunca sabemos oque realmente queria, nunca vamos saber, nem lendo oque você escreveu, nem imaginando o que possa estar a escrever. A Clara e o Lucas até hoje perguntam onde a mamãe está, eu digo que ela está feliz, curtindo a praia mas quando eles perguntam o porque não fomos, não tenho resposta, me dói, dói pra eles, talvez não tanto quanto doía pra ti. E quando a sua banda favorita lançou um álbum novo eu não aguentei, entendi finalmente tudo oque você pensava, tudo oque sonhava, tudo oque sentia. Hoje já comprei passagem só de ida, as crianças? Vovó cuida. Mas logo estaremos juntos novamente, só que curtindo as lindas praias do Caribe.","rating":8.12},{"title":"Devaneio","author":"Antúrio Brito","href":"poesias/anturio-brito-devaneio.html","date":"2026-05-13","text":"(Mobilidade pelos pensamentos 2) Voltei ao seu dia de março, desânimo inexistente, Devaneio feliz, apenas duas crianças sorridentes Voltei aquele pretérito em que só você existia Lembrei de seu brilho dourado, e de como te via Mas nessa memória que esse dia eu revivi Senti novamente o que a tempos não senti Culpa! Uma ansiedade boa com fraternidade No sonho resolvi todos nossos erros, só não era verdade! E se ainda nos sonhos te visito. Talvez tudo vivido não seja tempo perdido. E se ainda nos sonhos te visito. Talvez algo que vivi pode ter feito sentido","rating":7.67},{"title":"Dúbio","author":"Azaleia Brito","href":"poesias/azaleia-brito-dubio.html","date":"2026-05-13","text":"Próxima, tão próxima que posso tocar Mas longe, de tão longe só posso pensar Amo-te? Só sei que cada momento quero aproveitar! Infantil e primitivo, pois meu medo me faz afastar Mas toda noite eu só sonho com você Tô dormindo mas cedo só para te ver Mas quando durmo, vira pesadelo quando percebo que em nenhum plano, irei te ter","rating":6.12},{"title":"Dúvida","author":"Lizianto Brito","href":"poesias/lizianto-brito-duvida.html","date":"2026-05-13","text":"Sabe amor, eu poderia dizer que te amo Que te amarei eternamente independente do que vier Que lhe amarei após um fim de uma possível relação Que lhe amarei após o encerramento de nossa mútua paixão Que lhe amarei após epílogo do nosso livro de verão Mas eu ainda tô em dúvida Sabe amor, eu juro que queria te fazer a pergunta derradeira Um \"aceita casar comigo?\", e corta pra nós a vida inteira E mesmo assim seria pouco pois a morte não separa Apenas une a eternidade, a paixão e o paraísó que nos aguarda Então nosso amor selado dando inveja aos anjos que nos olhava Mas, eu ainda tô em dúvida Sabe amor, o tempo passou e nunca declarei-me Olhando ao meu ser nem ao menos amei-me Me colocando em um casamento xoxo, torturei-me Mas em todas as cartas nunca enviadas, sempre expressei o quanto eu amo-te Mas; eu ainda tô em dúvida Pois, se o amor é fogo que arde sem se ver amei errado, pois eu amei, me queimei e vi todo o estrago É que eu tô em dúvida pois meus outros amores deram borboletas no estômago, no máximo embrulho mas com você meu cérebro queria gritar que te amo meu coração fazia barulho Fui um estorvo na sua vida, não disse o que sentia E hoje não há dúvida, eu não te merecia Mas a minha dúvida verdadeira era se eu era altura de tamanha gentileza, era se eu fosse nobre a nível da realeza, digno da alta nobreza, Desculpa pois minha dúvida mudou minha natureza meu amor então foi consumido pela fraqueza e olha que beleza, no teu último dia eu ainda fiz o seu pior revelei o que sentia sobre a mesa e como grande ato de indelicadeza fiz confusão e estraguei a partida daquela amada princesa E hoje não há dúvida, eu não te merecia","rating":6.13},{"title":"É TDAH","author":"Zaquel Brito","href":"poesias/zaquel-brito-e-tdah.html","date":"2026-05-13","text":"Desculpa se as vezes não te ouço, não é culpa minha, a culpa é da física pois ela explica que som é o mesmo que ondas mecânicas que precisam de um meio para se propagar porém algo dela aí infelizmente não é capaz de solucionar, é como se comunicar com alguém que está em outro mundo, outro universo, outra dimensão, outro plano, em que obviamente não há nenhum meio onde o som se propague, então novamente desculpa todas as vezes em que sem querer te ignorei, vai por mim isso apenas uma prova do meu amor por ti pois, sempre que do meu lado me falava algo, não teve uma vez sequer que meu universo não era você.","rating":4.88},{"title":"Ébria de goles de você","author":"Celina Brito","href":"poesias/celina-brito-olha-so-como-essa-vida-e-louca.html","date":"2026-05-13","text":"Olha só como essa vida é louca, Disseram o céu é o limite Mas meu começo foi no céu daquela boca","rating":7.81},{"title":"Envelope","author":"Azaleia Brito","href":"poesias/azaleia-brito-envelope.html","date":"2026-05-13","text":"Feito por aquela garota, sou um envelope branco Sou uma expressão do que está em mim por isso amo tanto Em minha superfície, marcas de beijos feito por minha criadora Pelo meu conteúdo vejo ela inteiramente como poeta amadora Por descuido ou confusão então eu fui guardado Eu fui assinado Mas não enviado, Um ser com propósito, não concretizado Um objeto útil, porém inutilizado Feito pra enviar amor, mas nunca enviado Jogado no fundo do baú, nunca fui entregue Na escuridão, e na poeira, ninguém merece Mesmo sem vida, eu era tão cheio de amor Não queria aquele lugar cheio de vazio e tão sem cor Depois de longos momentos aquele baú foi reaberto Quando a minha dona me viu ela teve um sentimento incerto Cogitei ser entregue, meu destino seria completo Péssima previsão, me vi errado e incorreto Me leu e começou a chorar Logo após iniciou a se culpar Por fim me rasgou pra se aliviar Pois verdadeiramente, nem eu ou ela soube em si o que é amar","rating":7.19},{"title":"Erótico e indecente","author":"Antúrio Brito","href":"poesias/anturio-brito-erotico-e-indecente.html","date":"2026-05-13","text":"Ainda tenho o mesmo sonho, juro! Um sonho erótico, mas de modo puro Sonho no deleite de descansar um dia em seu colo E de lá ver o paraísó que és tu, nesse mundo te toco Talvez nem no céu poderia isso acontecer Se Deus não deixou nenhum mortal o ver Quem seria eu, para apreciar-te em toda sua graça Ninguém! Pobre, pecador, simples de alma devassa Ousei lhe amar, e esse foi meu erro, erro rude Tentei, tentei, tentei de mais, mas não pude E se pudesse trocava tudo por te ver Uma vida, e todo pós morte, todo meu ser E se possível, lhe roubaria o abraço mais íntimo Nem que depois fosse condenado ao castigo de Sísifo","rating":7.66},{"title":"Escolha?","author":"Lizianto Brito","href":"poesias/lizianto-brito-escolha.html","date":"2026-05-13","text":"Já suicidei-me e tive que continuar, Não escolhi nascer, minha escolha foi acabar, Não quis seguir nem consegui Sofri querendo morrer mais que vivi De profundo, só o pensamento do que eu senti Pois se fossem os cortes feitos, não estaria aqui Que péssima escolha que fiz aquele dia Não tentar nunca mais acabar com o que minha vida","rating":6.33},{"title":"Espinho","author":"Lizianto Brito","href":"poesias/lizianto-brito-espinho.html","date":"2026-05-13","text":"Tinha um espinho no meu dedo Um simples e minúsculo espinho No meu dedo tinha um espinho Um pequeno e ridículo espinho Ele não doía, não machucava Mas por que me incomodava aquele espinho? Ele não doía, não sangrava Mas então por que quis tirar o espinho? No fim escolhi o retirar, doeu, mas agora não tem espinho","rating":6.88},{"title":"Esta noite","author":"Flávio","href":"poesias/flavio-esta-noite.html","date":"2026-05-13","text":"Está noite nos amamos como nunca antes Nós dois de modo digno de amantes Fazendo tudo de forma tão errante Nós dois soados, ofegantes Sempre te vi como um anjo, um ser PURO Mas me via em malícia igual súcubo Me tirou de mim todo traço inupto E eu então te vi de jeito corrupto Você minha e eu seu, minha excitação, soergueu Meu corpo cresceu, minha vontade se ergueu Vi um doce em apogeu, um agridoce todo meu Me senti Orpheu, no momento em que por sua amada ao inferno desceu Mas quando fui ao amor que seria ininterrupto Me vi confuso Acordei de modo abrupto","rating":6.1},{"title":"Falso","author":"Lizianto Brito","href":"poesias/lizianto-brito-falso.html","date":"2026-05-13","text":"Por que tão difícil dizer sobre mim sem parecer atuação, Falo e parece que me martirizo atrás de atenção, \"por que sofres? Tens uma vida tão fácil\" \"só finges não poder, no fundo és hábil\" E sigo me matando e pelas palavras dos próximos sendo morto Mas é apenas falsidão, sou meu próprio estorvo Quem sabe quando acabar de fingir ser triste e de atuar meus choros solitários. Alguém me veja como ser humano e seja um pouco solidário","rating":4.23},{"title":"Farcry 3","author":"Zaquel Brito","href":"poesias/zaquel-brito-farcry-3.html","date":"2026-05-13","text":"Jason Brody Me disseram o que é Insanidade, repetir ação querendo outro resultado Hoje com sangue em mãos vejo que quem me disse isso estava errado Maldito cara que me deu coragem, hoje quando apanho posso revidar Maldito sentido que ganhei na viagem, adrenalina hoje é o que estou buscar Me consumia o medo ao segurar uma arma, hoje nem me importo de matar Me consumia o amor por minha amada, hoje, nem devo me importar Me consumia a adrenalina do grande salto, hoje só sobreviver vai me animar Chorava longe de casa, hoje fiz da ilha e do massacre todo meu lar E agora (re)voltando ao introito do poema, onde tudo se estabeleceu Vejo o que é a maldita Insanidade, hoje já entendi que ela sou eu","rating":6},{"title":"Fé","author":"Azaleia Brito","href":"poesias/azaleia-brito-fe.html","date":"2026-05-13","text":"De baixo pra cima olho-te Que ironia né... Tão linda, e calma, admiro-te Mas ainda tenho fé... Do que possuo fé tens perguntado, É fé de um dia lhe ter ao meu lado, De uma linha infinita de decepção Quero um algo sólido, sem ilusão Quero dormir um dia e ao acordar Te ver em seu esplendor, e te amar","rating":5.66},{"title":"Flor de tangerina","author":"Azaleia Brito","href":"poesias/azaleia-brito-flor-de-tangerina.html","date":"2026-05-13","text":"Hoje eu sonhei que ela voltava Então vi ela mais que linda A meia luz me afagava Cheirando a flor de tangerina Subitamente eu acordava Então era tudo mentira? A minha amada não chegava Nunca existiu essa menina...","rating":7.28},{"title":"Franklin","author":"Zaquel Brito","href":"poesias/zaquel-brito-franklin.html","date":"2026-05-13","text":"Filho sem pai e de mãe drogada, prazer Franklin Clinton Com dois anos meu pai encontrado na agressão sumiu no mundo Na mesma época minha mãe sumida de si encontrou as drogas e foi a fundo Não julgo, mas sem eles sozinho me criei Já vivi, bebi, vendi, perdi, arrependi, insisti, prometi mas errei Objetivo era ganhar a vida justa e limpa palavras que o conceito nem sei Não tive nem oportunidade e se tive também confesso que não tentei Sai da cela querendo mudar, ficar limpo e por um longo ano consegui Mas o errado me atraia, um trampo torto, um amigo torto, duas vidas vivi Sabiá que era errado mas quando roubei a joalheria vi que podia mudar Metade do sonho era ganhar a vida tive minha chance disso concretizar Após golpes e roubos fiquei rico mas então vi que nem poderia considerar Mal posso dizer que tenho vida, dinheiro por ter, nem é algo a almejar No fim não ajudei ninguém e sendo sincero nem a mim pude ajudar Agora sozinho, perco-me refletindo e se a vida eu conseguisse ganhar?","rating":6.21},{"title":"Fui hackeado","author":"Azaleia Brito","href":"poesias/azaleia-brito-fui-hackeado.html","date":"2026-05-13","text":"(Tierry) Eu tentei te esquecer e foi doideira Até que um dia sonhei Como fui covarde Agora durmo sempre que me bate saudade Tô evitando os lugares pra não te ver Tô rejeitando os convites pra beber E falar de beber me dá trela Bebê, era como eu chamava ela Meu coração pirateou meu chip E por eu ter sido descuidado Nesse nosso mundo de robô Eu no fim fui hackeado E se acaso, de madrugada Eu dizer que sou seu amado Perdoe-me, eu fui hackeado Se eu dizer: Ainda te amo É meu coração pisando em um pisado Perdoe-me, eu fui hackeado","rating":6.42},{"title":"Gritos","author":"Lizianto Brito","href":"poesias/lizianto-brito-gritos.html","date":"2026-05-13","text":"Entro no meu quarto e fecho a porta Lá fora? Gritos Coloco meu fone Aumento O volume O celular me diz que faz mal tal volume Penso Ouço gritos Aumento no máximo No fim é até melhor Pois prejudicando minha audição Não ouvirei mais gritos E não precisarei pegar meu fone Nem aumentar o volume Pois faz mal","rating":7.91},{"title":"Hoje estou vazio","author":"Lizianto Brito","href":"poesias/lizianto-brito-hoje-estou-vazio.html","date":"2026-05-13","text":"A cada risada minha sinto uma tristeza maior. A cada pessoa nova me sinto mais Solitário. A cada dia mais velho me sinto anos mais infantil. A cada dia mais experiente me sinto mais tolo; Tenho medo, e muito, não de terror ou coisas fúteis como a morte, possuo medo de voltar a ser quem sou ou ao menos me ouvir, tenho medo do menino que brigou com o pai e disse friamente a ele que a melhor saída é a morte, hoje discordo deste garoto, mas com ele na minha frente eu não conseguiria mentir, não conseguiria dizer que ele está errado, não conseguiria refutá-lo, sinceramente? Eu invejo a inteligência daquele menino, mas hoje se sou um herói ao meu cérebro é pq um dia abdiquei da inteligência pois aquele antigo prodígio utilizava de sua inteligência pra matar cada dia mais uma parte de si. Talvez oque eu e aquele menino precise seja só um abraço.","rating":7.22},{"title":"Hora de aventura","author":"Zaquel Brito","href":"poesias/zaquel-brito-hora-de-aventura.html","date":"2026-05-13","text":"Em uma hora de aventura fiz uma escolha pra mim Fiz da vida ode a você, seria um amor sem finn A ponto que nem me preocupei com o simples transtorno Aquele que me machucava, vós sois princesa de fogo E então cometi erros, e a nós causei dores Te trai e fiquei diabético, maldito reino doce","rating":7.31},{"title":"Ilusão","author":"Flávio","href":"poesias/flavio-ilusao.html","date":"2026-05-13","text":"Ó amor, que pena que nós seguimos esse caminho Eu namoro tu namoras Porém ambos tão sozinhos Ó amor, sei que no fundo me amas nem precisa falar Sei pela sua mexida de mão, ajeitada de cabelo E claro, o seu olhar Tipo naquela aula em que deixaste claro sua intenção Quando cochiva com sua amiga olhando pra mim sem nem disfarçar sua visão Depois piscou e riu roubando minha atenção Pode ser ilusão da minha cabeça Mentira de meu coração Criação de meu peito, mas por dentro é certeza Eu te amo e tu me amas, de forma verdadeira","rating":6.54},{"title":"Infinito","author":"Lizianto Brito","href":"poesias/lizianto-brito-infinito.html","date":"2026-05-13","text":"Dor de cabeça, visão turva Tudo acabou naquela curva Ouvi todos chorando frente ao abismo Me entreguei, cheguei então no infinito","rating":6.12},{"title":"Injustiçado","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-injusticado.html","date":"2026-05-13","text":"Coitado de ti, fazes muito, mas injustiçado Solitário, fostes de sua casa expulsado Pelo seu pai tirano, mas subistes em baixo Vistes de baixo em cima, mas fostes o mais elevado de baixo Honroso, cuida do humano de nível mais baixo E mesmo com tarefa nobre, pelo cargo humilhado Ó triste ser injustiçado, por ter almejado o topo, foste expurgado do puro mundo, e as margens vives hoje ignóbil, vagabundo","rating":8.98},{"title":"Invenção","author":"Lizianto Brito","href":"poesias/lizianto-brito-invencao.html","date":"2026-05-13","text":"Em uma noite sem brilho te inventei, e tolo me apaixonei pela minha mais bela mentira","rating":8.88},{"title":"Janelas Digitais","author":"Lizianto Brito","href":"poesias/lizianto-brito-janelas-digitais.html","date":"2026-05-13","text":"Percorro telas sem destino, Já nem sem quanto tempo faz, busco prazer no infinito, E não o encontro mais. Curto coisas curtas, Maldito mundo artificial, Vejo risos sem vidas, Até o cansaço é virtual. Tento parar, mas não consigo, É só mais um pouco, preciso, Me perdi e a tempos é vício, Estudar? Ler? Divertidíssimo! A mim apenas um pouco de risco, Abro abas ao abismo, só não sei parar!","rating":7.74},{"title":"Jásmim","author":"Azaleia Brito","href":"poesias/azaleia-brito-jasmim.html","date":"2026-05-13","text":"As vezes penso em ti, e isso me acalma perfeita de rosto, ainda mais de alma tu me salva em cada momento de solidão fizeste isso tanto, mais de um bilhão toda noite, morre minha esperança de ter mas as manhãs renascem com o simples ver mas se sempre morro... aqui jás minha paixão de tanto querer a jásmim de meu coração","rating":7.27},{"title":"João ninguém","author":"Ricardo Ravencourt","href":"poesias/ricardo-ravencourt-joao-ninguem.html","date":"2026-05-13","text":"Olha só Olha só Quem nos vem ao horizonte? Ele mesmo o Zé ninguém Só mais um João sem alma Sentes isso também? Bom, ele não sente nada! Isso garanto Pois é só mais um em que vive esperando Esperando um porquê, esperando uma vida Esperando uma alma Esperando uma revivida vida antiga Pra que assim possa descansar","rating":6.11},{"title":"Lembrei de uma vivência","author":"Lizianto Brito","href":"poesias/lizianto-brito-lembrei-de-uma-vivencia.html","date":"2026-05-13","text":"Lembrei oque não deveria lembrar Um amor que nunca pude amar Um beijo que não deveria beijar Uma bala na qual não valeu pular Ó moça bela por quê? Foi algo tão bom que eu queria esquecer Uma vida tão linda, que não quero mais viver Um amor tão grande que não quero reviver Um nós apenas, que não faz parte do meu ser Mas de tantas estações eu devo ignorar Maldita lembrança do meu antigo amar","rating":6.33},{"title":"Magnífica","author":"Antúrio Brito","href":"poesias/anturio-brito-magnifica.html","date":"2026-05-13","text":"Tempos que não voltam Eu a amei, e isso passou Os mortos em mim hoje notam O tanto de vida que em mim faltou Magnificamente, ela vive Magnífica, mente, eu tô sofrendo Já fui negado, meu eu insiste Sou um morto, e ela vivendo Culpa do teimoso eu Que prefere sofrer a mudar Culpa de quem um dia viveu E gastou a vida pra amar","rating":7.64},{"title":"Mala","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-mala.html","date":"2026-05-13","text":"Fui expulso de casa Abro a mala e nela um reflexo da alma Vazia, obscura, inerte, porém, calma Pouco espaço uma mala e muita bagagem Não sei oque colocar não é como uma viagem Devo levar memórias? Histórias? Sentimentos? Devo deixar minha ignorância e pegar o conhecimento? Não há espaços pra sonhos pois já me atrasou Também não há pra sentimentos, isso acabou Na mala não coube remédios, apenas a dor Mas comprarei tudo de novo, já que nela tem amor","rating":7.39},{"title":"Mão","author":"Ricardo Ravencourt","href":"poesias/ricardo-ravencourt-mao.html","date":"2026-05-13","text":"Aquela que me presenteou foi a primeira a me retirar E então sem nada, no chão uma outra mão veio a me empurrar Maldizentes, um aglomerado de mãos a me apontar Olho pro céu e um óbulo divino, uma simples mão me ajudou a levantar","rating":5.66},{"title":"Mario","author":"Zaquel Brito","href":"poesias/zaquel-brito-mario.html","date":"2026-05-13","text":"Ó linda princesa, dei uma uma flor tão bela que esquentaste o coração, mas que peninha que nessa fase difícil de ti ouvi não Ó linda princesa, se necessário subo pelas paredes pra te encontrar, luto com fantasmas pra salvar, cresço e perco vidas pra te amar Ó linda princesa, por ti salvei todo reino cogumelo, apenas pra ser recebido com um \"sua princesa está em outro castelo\"","rating":7.21},{"title":"Me apaixonei","author":"Azaleia Brito","href":"poesias/azaleia-brito-me-apaixonei.html","date":"2026-05-13","text":"Me apaixonei, por um momento Me apaixonei, por um pensamento Me apaixonei; por um erro!","rating":7.4},{"title":"Minha atual moira","author":"Antúrio Brito","href":"poesias/anturio-brito-minha-atual-moira.html","date":"2026-05-13","text":"Cada vez mais percebo que o passado ainda sussurra em mim Carrego seus ecos como quem não sabe onde é o fim Mas diferente de outrora, há algo novo que insiste em florir Se antes fui refém do que perdi, hoje encaro o que tenho em mãos Aproveitando o momento, se é mentira, deixe-me cair em ilusão Entendendo o sentimento, ela que só com existência cria meu sorrir Deusa de meu destino, como me alegra e gera gozo até então Bobagem minha, a de tentar descrever, quem tira-me as palavras, Radiante sorriso que me tira o ar, perfeita ladra que me rouba o coração No fim, já não sei se és destino ou escolha consciente Mas sei que diferente das outras, te encaro no presente E isso, além de todas, ao olhar o tempo lhe enxergo em minha frente Então, se fores mesmo mais uma entre as moiras do meu viver Que eu não te perca, teça nós, teça juntos, teça eu e você Para que juntos seremos nós, sem máscaras, apenas nosso ser.","rating":7.88},{"title":"Minha ilítia","author":"Lizianto Brito","href":"poesias/lizianto-brito-minha-ilitia.html","date":"2026-05-13","text":"Engolfado na minha labuta amniótica Revelaram-me o meu fado Viver, a condenação mais ignominiosa Então me vi um desditado Encetando-me a córnea e o pejo Lobriguei a aurora da dor Pugnei pelo estagnado fleumo alterquei em vão e a cor E a alvacenta realidade me intimava CARPES-tu, ela mandava Lamuriei ao altíssimo vida digna E de bon grado concedeu-me a libitina","rating":6.12},{"title":"Minhas antigas moiras","author":"Antúrio Brito","href":"poesias/anturio-brito-minhas-antigas-moiras.html","date":"2026-05-13","text":"Cada dia mais vejo como fui infantil no passado Passo por recordações passadas e o que não passa, é o arrependimento engasgado Tentei esquecer mas as escolhas feitas, tal qual tecelãs modificam no meu futuro chamado Se outrora tentei esquecer hoje aceito, não sou vocabulário pra ter um pretérito perfeito, e mesmo que em outro universo eu fizeste tal feito, não sei se lapidaria meu futuro ou ao menos seria eu mesmo Rodado de lembranças do passado ainda te vejo ó moça bela Berrei a todos que eu a queria, de maneira quem em mim era sincera Tateei o meu chão, depois me vi em abismo, e aquele eu se desequilibrou e logo após fora esquecido Ainda me sinto mal por como te tratei, fomos tão indisplicentes A que mais amei, que mais marcou, de todas a mais diferente Nem por isso foi bom, saudades de mesmo que forçado, ser por ti sorridente Reavivaste minha alma passei noites chorosas com você Beningnamente me mostrou que eu poderia sem o passado viver Caminhaste ao futuro comigo, de certa forma educaste meu ser, mas meu amor que hoje fria como um fogo antigo, te deixei e ainda pergunto, por que? Ferraste com minha mente, e a marca ainda agora vívida Nancíbea venenosa, mas a senti intensamente como amiga Dado todo o passado no presente fui deixado e no futuro foste esquecida No fim, vejo que sou incapaz de resumir oque eu sinto ou senti em um poema Para as moiras do meu destino fui um peão do esquema É que de certa forma amo e odeio, esqueci e ainda lembro, sempre fui meio hipócrita, esse é o problema Então, espero que na próxima moira, meu próximo eu não a afronte Pra então meu primeiro eu desta vida afoita, não imitar-me e conhecer caronte","rating":7.89},{"title":"Mobilidade pelos pensamentos","author":"Antúrio Brito","href":"poesias/anturio-brito-mobilidade-pelos-pensamentos.html","date":"2026-05-13","text":"Voltei aquele dia tão calmo de março Em minha mente voltei ao passado Voltei ao tempo que só tinha você Lembrei de como ti pra mim era viver Mas nessa memória que esse dia eu revivi Senti novamente o que a tempos não senti Culpa! Uma ansiedade boa com fraternidade No sonho resolvi todos nossos erros, só não era verdade! E se ainda nos sonhos te visito. Talvez tudo vivido não seja tempo perdido. E se ainda nos sonhos te visito. Talvez algo que vivi pode ter feito sentido","rating":7.11},{"title":"Mundo cinza","author":"Lizianto Brito","href":"poesias/lizianto-brito-mundo-cinza.html","date":"2026-05-13","text":"E nessa introspecção vejo a verdade Do que realmente possuo saudade? De ver as cores vibrantes da vida De modo singelo ver a esperança de cima Senti o arder fúgido que queima a retina Hoje inexistente, o céu e pulmão estão cinza Abriram-se as portas do inferno e que vossa pecaminosidade seja bem vinda","rating":7.43},{"title":"Nação","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-nacao.html","date":"2026-05-13","text":"Ora ora, ora essa, tristeza não existe, todos somos felizes à beça. Onde? Não sabes? Ora ora, ora essa, É de onde a vontade não interessa É de onde a palavra não pesa Nação minha, nação nossa, nossa festa Opinião, tinha, opinião nossa, opinião dela Amo de paixão e não posso reclamar Vivo minha nação, apesar do pesar","rating":3.98},{"title":"Não consigo","author":"Lizianto Brito","href":"poesias/lizianto-brito-nao-consigo.html","date":"2026-05-13","text":"Eu sempre sonho, sonho em tudo que eu queria Eu queria me formar, fazer mestrado e ser o mestre do ensino Mas eu não consigo É que eu queria ter sucesso, ter mansões, carros e ser rico Mas eu não consigo Quem sabe fazer direito e galgando posições dominar o judiciário Mas eu não consigo Ou então um grande médico de grande renome e maior salário Mas eu não consigo Sendo sincero queria encontrar alguém que me ensine amar Mas eu não consigo Na verdade, eu queria, eu só queria, confiar em mim e parar de chorar Mas eu não consigo Eu queria viver ao invés de ficar imaginando Mas eu não consigo","rating":4.87},{"title":"Não foi por escolha","author":"Celina Brito","href":"poesias/celina-brito-nao-foi-por-escolha.html","date":"2026-05-13","text":"E a vida dela foi um poema, um poema lindíssimo, no entanto escrito com lascas de carvão","rating":8.16},{"title":"Noites vêm e vão","author":"Lizianto Brito","href":"poesias/lizianto-brito-noites-vem-e-vao.html","date":"2026-05-13","text":"Já tem tantas noites passadas Tantos engasgos e soluçadas Tantos que já não lembro mais Só que dói muito, aliás Não foi você que sempre dizia Dizia pra mim que toda ação, sempre voltaria? Bom, vejo que você está sentindo na pele E por não fazer nada eu me sinto um verme Você sempre fala de escolhas né? Vamos voltar ao tempo passado, você sabe qual é Desde sempre você tomava esse gole Criou uma criança triste e mole Sempre tomou um gole dessa anestesia Por isso não te falo mais um bom dia, Você toda noite tomava aquela decisão Por isso hoje, só penso em ti com o copo na mão Engraçado, logo você, que jurou que seria diferente, Não ia ser oque seu pai foi, violento e ausente, Por causa do copo, várias vezes te vi inconsciente Hoje diz que não teve tempo, teve sim, não mente Reconheço que depois você conseguiu mudar, Mas de tão tarde, não quero nem tentar Lembro de ser criança e pensar apenas em brincar Foi quando você começou a beber sem parar E essa criança não sabiá se você iria estar lá Cresceu sem saber se um dia você iria se acidentar Cresceu sem saber se tu ias beber chegar em casa e gritar Cresceu sem saber se ia beber, ou finalmente parar Essa criança sem tomar uma gota Devido ao álcool tá morta Se quiser, eu consigo te perdoar, , Mais nunca prometerei ESTAR","rating":7.62},{"title":"Novos termos","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-novos-termos.html","date":"2026-05-13","text":"Amei ela, de tanto virou vício, amei-a tanto que acabou Mas diferenciamos nisso, ela nunca me amou Usufruiu-se e cuspiu no prato que usou, maldita princesa, maldito amor Acabou, o termo certo é terminamos, e agora em novos térm(in)os terei que viver","rating":6.13},{"title":"NPC","author":"Zaquel Brito","href":"poesias/zaquel-brito-npc.html","date":"2026-05-13","text":"Estava vendo minha rotina e mesmo odiando ela aprendi a amar E almejando algo como sempre \"A Hora da Estrela\" um dia eu vou brilhar Porém tal qual no livro, o maldito mundo quis me ofuscar E dessa vez, o próprio sol apareceu, pronto para meu momento assassinar","rating":6.17},{"title":"O Abecedário das palavras sem Vida","author":"Celina Brito","href":"poesias/celina-brito-o-abecedario-das-palavras-sem-vida.html","date":"2026-05-13","text":"A ABRIGO, onde o eco se perde em solidão, A lamúria em desvelo, abraça a amena escuridão. B BANDEIRA, rasgada ao vento, sem cor, Baixastes o símbolo, hoje tão sem amor. C CAMINHO, o alongamento da dor, ao sair do momento Cada passo é um suspiro, um longo lamento. D DESERTO, dedicada a amores, na mente um canto De areia amarga, onde o sonho é quebranto. E EVASÃO, se um dia brilhava, agora é nevoeiro, Ele quis a ocultação, até se tornar rotineiro. Fuga F FANTASMA, diz-se do que assombra vossa vida Fica a espreita e não sai mesmo que insista G GIGANTE, superlativo de adjetivos como dor Gravidade exarcebada a nomeação do amor H HISTÓRIA, contada em páginas perdidas, Há hoje dúvidas se propositalmente foram esquecidas. I ILHA, cercada de sabedorias sem paz, Infelizmente a tristeza, prende a ignorância não mais. J JARDIM, onde flores já não vão brotar, Jogadas ao chão, pisadas pelo querer amar. K KARMA, uma mentira a si, na busca da justiça Kantiana moralmente, mas sem voz, perdida. L LUZ, esperança que se apaga no fim do corredor, Lágrima de um sonho que morre em dor. M MÚSICA, arte que toca até demais no coração, Melodia interrompida, em profunda solidão. N NUVEM, que esconde o azul do céu, Navega no pranto, sem deixar um só véu. O OLHAR , uma perdição no vácuo da vida, Omissão de esperanças, no tempo que abriga. P PAPEL, escrito, guarda segredos, Pedaços de histórias, fostes tantos enredos. Q QUEDA, foi-se um sonho em sua vertigem, Quebrando o silêncio, ecoando a desfigem. R RUÍNA, feita de paredes há mortos no lugar, Rostos apagados, nos quadros, deste lar. S SOMBRAS, vislumbre de traumas Ilumina a escuridão, Sempre seguindo, seu problema, sem perdão. T TRABALHO, o ato incessante de se doar a algo, Tende a ser vazio e um reflexo do falho. U UNIVERSO, repleto de estrelas distantes, Um espaço no nada a cabeça do errante. V VENTO, que arrasta memórias sem vida, Vazias promessas, e tantas despedidas... X XOTE, que um dia floresceu em fervor, Xoxo, reanimou a dor, de um passado em mais dor. Y YIN-YANG, a paz e equilíbrio que já não tenho, Yakuzam-me de crimes de ódio de meu convênio. Z ZELO, pretérito que se esvai entre dedos cansados, Zéfiros do tempo, em sonhos apagados.","rating":6.11},{"title":"O amar!","author":"Azaleia Brito","href":"poesias/azaleia-brito-o-amar.html","date":"2026-05-13","text":"Sigo em frente pois tenho pensado Deus? É meu amigo e anda do meu lado Assim eu não posso sofrer no ano passado Mas a companhia sempre é perdida e trocada Amo o amor, e dou amor a mulher amada Olho o passado e meus textos hoje, servem apenas pra me humilhar Eu sou o poeta, e não aprendi a amar Mas as vezes me falta coesão Me falta racionalidade pos o amor o degenera Eu sou o amar e não aprendi a ser poeta","rating":5.88},{"title":"O bobo e a deusa","author":"Antúrio Brito","href":"poesias/anturio-brito-o-bobo-e-a-deusa.html","date":"2026-05-13","text":"E eu disse, seriamente, que a amava, não me levando a sério, ria muito minha amada. Tive atitude, erro craso, me vendo ressaltou-me o nariz de palhaço, a cara de bobo, o riso espalhafatoso, o jeito desengonçado, as travadas quando falo, e olhos, que tão bobos só servem pra olhar, a pose de camarão, e um nariz ao qual não amarão se por desse modo continuar. E então desculpe o incômodo, se por piada interpretou, não está aqui quem falou, volto ao meu canto cômico, perdoe a hybris desmedida que por soberba, fez a um mero mortal pretenção de querer uma deusa.","rating":7.31},{"title":"Ó Deus aqui vai uma oração","author":"Lizianto Brito","href":"poesias/lizianto-brito-o-deus-aqui-vai-uma-oracao.html","date":"2026-05-13","text":"De um servo teu que não te vê como perdão Blasfemei contra a sua imagem mas ainda não te vejo como o além Mas se realmente me botaste aqui sinto que necessito de desculpas também","rating":6.11},{"title":"O labirinto que hei de entrar","author":"Lizianto Brito","href":"poesias/lizianto-brito-o-labirinto-que-hei-de-entrar.html","date":"2026-05-13","text":"Em torno do abismo tudo é precipício, Ao passar quero muito me jogar, No movimento cíclico, um desejo místico, Nesse airoso oco, quero adentrar Mas impossibilitado pela ética, Mas como me chama aquela estética, Mas a flor é que possui o néctar, Mas não é quem possui minha idética Uma impetulante ordem de acabar com isso A obedeço indo contra todos riscos Mas do ainda não testado eu possuo vício Do estreito óbulo divino que por ti há de ser vindo","rating":6.99},{"title":"O monstro!","author":"Lizianto Brito","href":"poesias/lizianto-brito-o-monstro.html","date":"2026-05-13","text":"Estando bem como sempre, disfarçando vícios. Embriagado de tristeza na rua, só mais um ridículo. Tentando fugir de mim, me vejo em retorno a ciclos Afastado de todos, cada vez mais um bicho E tudo isso só piora, como sou maldito Já não creio em nada, nada daquilo que acredito Guardei em mim, sentimentos que reviro Criei, aquele que eu não queria que fosse visto Criei um monstro, Está vivo! Está vivo!","rating":7.17},{"title":"Ó Morte","author":"Lizianto Brito","href":"poesias/lizianto-brito-o-morte.html","date":"2026-05-13","text":"Ó morte porque vens tão atrasada? Já não viste que eu morri a tempos? Ó morte, Então me leve, senhora do submundo, ceifadora de sorrisos, me leve, pois do mundo já não vejo graça, sua contraparte sim, me tirou toda vida. Ó morte então me leve, e me faça de ti seu noivo, pois mesmo sem de conhecer, esperei a tempos ansiosamente por sua chegada, e a tempos em vida, a existência da morte é o único sentido que me apetece.","rating":8.11},{"title":"O poema não feito","author":"Epaminondas Brasa Bela","href":"poesias/epaminondas-brasa-bela-o-poema-nao-feito.html","date":"2026-05-13","text":"Eu penso, não digo, Eu penso, não escrevo, Eu penso, não declamo, Eu penso, não faço, Eu penso, só penso, não poderia fazer, Eu penso em fazer um poema, Mas o que vou dizer? Eu penso só penso, não poderia fazer, Eu falo me expresso, Digo o que queria fazer, Eu paro sento, Continuo sem saber, Eu juro tento, Não consigo escrever, E então eu penso, Sobre o que vou dizer? Se a tempo tento, E não expresso o viver Por fim vejo, Como isso vou resolver Não penso, faço, Um poema sobre escrever","rating":7.74},{"title":"O que me resta?","author":"Antúrio Brito","href":"poesias/anturio-brito-o-que-me-resta.html","date":"2026-05-13","text":"Me tiraram minha metade Tiraram minha metade Eles me tiraram A metade boa Eles tiraram a metade Eles me tiraram a boa metade E desde então... Sobrou apenas solidão Pois tiraram-me a companhia Sobrou apenas estupidez Pois tiraram-me a razão Sobrou apenas dor Pois tiraram-me a paixão Sobrou apenas aparências Pois tiraram-me a beleza Sobrou apenas sexo Pois tirararam-me o amor Sobrou apenas tristeza Pois tiraram-me a razão de ser feliz Sobrou apenas um buraco Pois ele tiraram minha metade Sobrou apenas as sobras Pois me resta eu","rating":6},{"title":"O reflexo do meu avesso","author":"Lizianto Brito","href":"poesias/lizianto-brito-o-reflexo-do-meu-avesso.html","date":"2026-05-13","text":"Minha vida ao contrário já não sei o que é sonhar Pois no meu quarto durmo mal querendo acordar E no meu pensamento sempre a perguntar Indago-me a todas partes de mim Porque de todos, eu tenho que ser assim? Quem sabe se eu não falasse apenas comigo não seria tão ruim. Mas não sei me expressar, então me reprimo Reprimir faz mal, meu eu, eu suprimo Suprimido penso em facas, almejo alívio Só que o mesmo não chega, e eu sigo sozinho Pensando bem sozinho não! Meu quarto já não cabe mais pessoas vozes e frustração Estou sufocado pela companhia da minha solidão E de tão pálido que estou, o mais vivo é o sangue na mão","rating":6},{"title":"O simples ato","author":"Ricardo Ravencourt","href":"poesias/ricardo-ravencourt-o-simples-ato.html","date":"2026-05-13","text":"Naquele chão, estirado, pálido, juro que quase morro Tantas pessoas perto de mim, mas não ouviram meu socorro E então eu me vi perdido, e pensei que nada conseguiria me amparar Olho pro céu e um óbulo divino, uma simples mão me ajudou a levantar","rating":6.11},{"title":"Oi mãe","author":"Lizianto Brito","href":"poesias/lizianto-brito-oi-mae.html","date":"2026-05-13","text":"Oi mãe me deixa dormir com a senhora É que estou com medo monstro a fora É que meus demônios em volta apavora É que ao tentar me vejo em meu sonho e isso me acorda Mãe porque me colocaste aqui pra sofrer? Se soubesse que eu não iria ter força, teria o brio de me conceber? Provavelmente, pois não tem o tato de o que é viver Porque é como dizia Clarisse: \"mãe é não morrer\" Mas mãe porque então pra mim é como se estivesse Em minha vida se mata e volta como uma troca de vestes Se some tenho saudade, se volta me odeia, oque quer que eu sinta não sei mas senti-lo Se não me reconheces mais aqui me apresento, prazer, eu ERA o seu filho","rating":7.23},{"title":"Olá Deus","author":"Lizianto Brito","href":"poesias/lizianto-brito-ola-deus.html","date":"2026-05-13","text":"Olá Deus, como vai? Se é que vai, Se é que existe Bom, comecei mal Olá Deus como está? Espero que bem, pois eu não Por que de tanta dor? Não consigo continuar Por que tão pouco Sabor? eu quero saborear E denovo eu antes do meu amor começo a lhe culpar Bom, então irei do zero Estou aqui pra te suplicar, Venha! Venha a mim pois a ti não chego me perco em distração Venha a mim pois não te vejo me perco em ilusão Venha a mim pois em dor lhe observo me perco em imaginação Venha mim pois eu não consigo ir a ti Venha a mim pois o seu amor é o único desprezo que eu não senti","rating":3},{"title":"Paixão mortal","author":"Antúrio Brito","href":"poesias/anturio-brito-paixao-mortal.html","date":"2026-05-13","text":"Ainda lembro a primeira vez que eu te vi No momento póstumo eu conheci o amor Todos tristes e eu pensando o que perdi A chance de no cinza nunca mais ver cor E dali então me apaixonei E após, com saudades de ti eu fiquei E de tão sem graça, o futuro mudei E por fim eu aceitei, por ti me entreguei Me apaixonei pelo brilho da morte Pra revê-la já fiz cortes No fogo irradiava sua beleza e cor A partir de dor alheia me mostrou o amor Por fim lamuriei que não mais tinha graça nossos encontros E ela me pediu uma prova do meu amor de manicômio Me entreguei em completo pela paixão infinita E por fim a última vítima dessa ilusão foi a minha vida","rating":6},{"title":"Paixão terminal","author":"Antúrio Brito","href":"poesias/anturio-brito-paixao-terminal.html","date":"2026-05-13","text":"Ainda ontem observei-te vertendo um pélago sensivelmente rúbido Escarlate, devido a junção divina de sentimentos puramente impuros Vossa airosidade, esvoaçava na paragem, trazendo-me borboletas Então sovaste-me de maneira tão fina quanto um pouco grotesca Atermaste meus pensamentos com sua graciosidade aurifúlgida Acalmei-me então, e voltei-me a forma verdadeiramente lúcida Bedelhamos então, uma opima e eufônica sintonia opípara Arrazoamos nossa paixão sáfia, e descobri então uma luxúria deípara E então beijei a vossa boca, munhequei-te para vida E então meu amor de forma abstratamente extrovertida GRITOU, EU TE AMO!","rating":7.17},{"title":"Palavras são alívio","author":"Celina Brito","href":"poesias/celina-brito-palavras-sao-alivio.html","date":"2026-05-13","text":"Sempre senti muito, desde sempre fui intenso E aprendi a escrever pois também fui muito extenso Palavras doem e me curam, como? Eu também não entendo Mas pra expurgar isso de mim sigo me satisfazendo, boto a cabeça pra pensar o braço a funcionar e sigo escrevendo","rating":7.16},{"title":"Para a moça bela...","author":"Flávio","href":"poesias/flavio-para-a-moca-bela.html","date":"2026-05-13","text":"E é aquela moça? Sabe aquela? Ela que me faz julgar-me indigno Sou insuficiente a moça esbelta Pois eu mortal, e ela do Olimpo Pelo dia, minha mente só pensa nela Principalmente naquele sorriso Então peço desculpas a ti ó bela Por demonstrar o quão sou ridículo","rating":7.98},{"title":"Parabéns","author":"Flávio","href":"poesias/flavio-parabens.html","date":"2026-05-13","text":"Lembro de minha vida antes de você, eu era o louco que um dia iria atirar Queria ficar no meu canto porém a professora meus planos iria atrapalhar Por sorteio tive uma então péssima notícia na qual minha vida iria mudar A típica inteligente extrovertida, iría fazer a dupla, no íntimo queria gritar Mas surpreendente você era uma ótima pessoa, quase que perfeita Engraçada, benévola, apolínea, sem uma característica malfeita Então viraste minha primeira amiga não sei oque viu em mim Pois eu tão chato, já tu como o mais belo e raro marfim E desde então vem me mudando, se sou uma pessoa melhor é graças a ti Pois sua alegria vem me contagiando se não quero parar, não é só por mim Isso tudo a quase um ano mas nem parece ter sido tanto tempo assim Esse é o seu primeiro aniversário comigo em sua vida Então parabéns e obrigado, minha, querida, amiga... 10/03/07","rating":5},{"title":"Parafuso","author":"Celina Brito","href":"poesias/celina-brito-parafuso.html","date":"2026-05-13","text":"Só um parafuso confuso, Que em parafuso havia entrado Não se sentiu como tal não julgo, Tá onde quis mas de modo deslocado Só um parafuso confuso, Não optou ser influenciado Foi à igreja dos pregos e por azar Não escolheu o que seria pregado Só um parafuso confuso, De último se viu de modo errado Se julgou prego e se fez na tábua Desmoronou pelo mal resultado Só um parafuso confuso Sua confusão foi a ruína Talvez e só talvez, sua confusão seja consequência da sua vida","rating":8.12},{"title":"Pato","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-pato.html","date":"2026-05-13","text":"Olho pro mundo e penso, oque sei fazer? Sou um Pato, não sei voar nadar ou correr Mal sei andar quem dirá sobreviver E na matéria do amar também não sei sobre viver Mas te vejo minha pata amada, um dia terei coragem Te verei de forma pura, mas ainda selvagem Mas o tempo passou, o cisne chegou, com dinheiro e te amou, mas falso pra outra voou Então o ganso que lhe observou te consolou lhe cuidou, te amou até o dia que lhe maltratou Após isso a história aumentou, o marreco com seu papo lhe ganhou, e logo após como os outros te deixou Eu que sempre te amei criei coragem de me declarar Lhe jurei meu amor, de forma sincera que jamais iria quebrar Mas me julgaste e magoaste por medo do passado voltar Quem sabe você atrai pessoas como você pro fim de se machucar E então apático fiquei, patético eu acreditou no amor de quem não o conhecia, sofreu oque a sua burrice casou e se matou pois dedicou sua vida a amar quem não correspondia","rating":7.12},{"title":"Perdido","author":"Lizianto Brito","href":"poesias/lizianto-brito-perdido.html","date":"2026-05-13","text":"Eu não estou perdido, só que me falta me encontrar. Eu não estou perdido, só que não faço nada pra me achar. Eu não estou perdido, só quero ajuda para me salvar Eu não estou perdido, ela ainda vai me achar Eu não estou perdido Perdido:que sumiu e eu nunca estive","rating":4.72},{"title":"Pesadelo","author":"Lizianto Brito","href":"poesias/lizianto-brito-pesadelo.html","date":"2026-05-13","text":"No cartório e igreja consolidamos nosso amor PARA TODO O SEMPRE será tudo ao nosso favor Mas como sempre a sorte da vida veio apenas pra me contrariar Me deu tudo por destino mas por eu estar em mim, eu vejo meu azar Na lua de mel vi o doce de modo muito extrovado Mas aquela boca disse \"aceito\" pro seu novo amado E hoje eu estou triste, que erro tolo eu cometi Tanto amei, que não demonstrei oque senti Sem ti hoje estou, triste. E tudo por falta de mostrar a sensação que em mim habitava Dizer te amo, pra expressar o quanto te amava Sorrir pra você devido a felicidade naquele dia te ter Só foquei em coisas grandes, sendo que o pequeno vale mais se com você","rating":6.66},{"title":"Pomba","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-pomba.html","date":"2026-05-13","text":"Um dia me perguntaram qual o meu ser? Qual minha verdade? Sou uma pomba respondi, mas disse a realidade? Me veem como um sinal Para eles sou esperança e paz Não tenho certeza de nada mais, Vivo tão cheia de nada, mas, Eu realmente sou oque sou? O \"EU\" existe? Ou melhor, eu existo? Não sei o que serei, nem pra onde vou Só sei o que sei, mas a vida virou Deu um giro em 360, uma pena que voltei ao mesmo lugar Uma pena que voei tanto que desaprendi a voar Uma pena que tenham pena de mim Depenaram minhas penas me penalizaram e que eu viva sozinho Uma pena... Me veem como paz, esperança e liberdade Mas sou preso em mentiras, e essa é a minha verdade","rating":6.89},{"title":"Prateleira","author":"Celina Brito","href":"poesias/celina-brito-prateleira.html","date":"2026-05-13","text":"A prateleira estava bagunçada por você, como sempre, o problema é que depois que arrumei, nada se desorganizou mais.","rating":8.84},{"title":"Qual herói seria?","author":"Zaquel Brito","href":"poesias/zaquel-brito-qual-heroi-seria.html","date":"2026-05-13","text":"Perguntaram-me: \"se você fosse um herói, qual seria?\" Primeiro eu pensei em todas os cavaleiros aos quais a princesa salvaria, quem sabe o shrek mas pensando bem comparar-te a fiona é um tanto quanto de mal gosto, quem sabe dom Quixote e você Dulcineia, se bem que... Esquece! Nem dele eu gosto. Quem sabe, não, deixa, mal vale comentar. Eu pensei no Hulk mas perto de você sou tão fraco, talvez eu seja o Superman e você é minha Kriptonita, na verdade vou me confessar eu sou o Tocha Humana, só que você tira todo o meu oxigênio por isso eu não pego fogo, quem sabe o caçador de Marte e perto de você eu fico fraco porque você é Tão quente não sei, talvez eu seria, não sei, talvez eu seria você, que sempre me salva nas noites escuras.","rating":6.13},{"title":"Que ideia","author":"Flávio","href":"poesias/flavio-que-ideia.html","date":"2026-05-13","text":"Uma excursão a outro estado, adolescentes dividindo quarto, Que ideia Revista a mochilas mal visto Entra um pouco de álcool escondido Que ideia Jovens idiotas, brincadeiras idiotas, Segredos idiotas, desafios idiotas, Que ideia Amigos falsos criam planos Manipulam por debaixo dos panos Que ideia Tentando entender eu pergunto, O casal não oficial fica junto! QUE IDEIA!!! Ao entender tudo animei-me A ponto que na prévia embriaguei-me Que ideia Ao chegar o momento derradeiro Sua índole foi contra fazer tal ato Eu alcoolizado de mais pra você Perdi a chance de então te ter No outro dia ainda virei piada Chorei e todos lá acharam graça Que ideia... Que ideia","rating":6.14},{"title":"Rato I","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-rato.html","date":"2026-05-13","text":"Rato meu querido rato! Pelo ser humano sempre julgado Rato, meu querido rato Como peste sempre foste tratado Ó Rato meu querido rato Tenho dó, deste coitado, bicho desgraçado Rato meu, querido rato Pra carregar doenças, o motivo é claro Rato, meu, querido Rato Pois vives às margens, de todas formas maltratado Rato meu querido, RATO! Pois o sujo, suja seu mundo, e julga o mal lavado","rating":9.41},{"title":"Rato II","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-rato-2.html","date":"2026-05-13","text":"Rato, meu querido rato! Um teste inventado, nasceu laboratoriado Rato, meu querido rato Foste cobaia de um ser desgraçado Ó Rato, meu querido rato Tantas agulhas, prisões, pobre condenado Rato, meu, querido rato Pela semelhança a quem não te vê semelhante é usado Rato, meu, querido rato Não vive, dar vida a quem te usa é seu fado Rato, meu querido, RATO! Quem te vê como menos vivo, não vive seu medo e sofrimento estampado","rating":8.12},{"title":"Rato III","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-rato-3.html","date":"2026-05-13","text":"Ó meu querido ratinho Como podes você, tão diferente de mim, ser o meu ser vizinho Ó meu querido ratinho Só tu me curas, a companhia do menino sozinho Ó meu querido ratinho Uma amálgama de nossas empatias criaram um silêncio místico Ó meu querido ratinho Não falamos mesma língua, indiferente, quem diz, não diz comigo Ó meu querido ratinho De migalha vivemos, e julgados pelos que nos chamam de cão, cínicos Ó meu querido ratinho Pois então, viveremos se entendendo enquanto não entende-me o próximo que me vê como longínquo","rating":8.76},{"title":"Rato IV","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-rato-4.html","date":"2026-05-13","text":"Rato, meu querido e velho rato, Julgaram que do nada, lhe tinham criado Julgaram que pro nada, tu tens lhes mandado E eu julgo que o nada é seu verdadeiro fado Pois rato, desditoso desgraçado, Sua existência a quem exige é um abalo Sua existência a quem existe é um fato A sua existência em si, é um mero dado Rato, matusalênico rato Apesar de tudo acostumou-se, mesmo após ser degredado Vistes de baixo em cima, mas fostes o mais elevado de baixo Fez do inferno, sua morada, e foste ao ponto mais elevado Foi nobre na plebe, se ergueu a Rei dos ratos Rato, carcomido rato, Uma pena que após isso naquele beco foste alvejado Se foste o rei de cima, como esterco voltou a baixo Após por sujeira o outro, assumiu seu cargo Rato, novo rato E outro rato se cria, um novo revoltado, Sem chance de ir pra cima, fica em cima lá embaixo, E contra tudo que sofreste a sua nova arma é o preparo.","rating":8.07},{"title":"Recordar","author":"Lizianto Brito","href":"poesias/lizianto-brito-recordar.html","date":"2026-05-13","text":"Nas redes sociais me lembrei de você Vi fotos vídeos E um tema cliche Músicas, poemas me diziam Recordar, recordar é viver Recordar é Viver? Não! Recordar é sofrer Recordar é machucar Recordar é remoer Recordar é lembrar Recordar é manter Recordar é rebobinar Recordar é perder Recordar é estagnar Recordar é morrer Recordar é... Sei lá! Como posso dizer oque é recordar sem conseguir me recordar? A recordação da felicidade já não é felicidade; A recordação da dor ainda é dor; A recordação do amor não é mais amor; Mas a recordação da dor ainda é dor. Recordo-me de tempos passados, tão passado que não tinha o que recordar, e pelo que eu me recordo, eu era feliz mais pensando no futuro que recordando o passado, mas de que importa essa recordação? Recordar não é viver, e se for? viver é melhor que sonhar, e no fim viver é viver e nada mais","rating":7.1},{"title":"Resposta a Drummond","author":"Lizianto Brito","href":"poesias/lizianto-brito-resposta-a-drummond.html","date":"2026-05-13","text":"No meio do caminho tinha uma pedra tinha uma pedra no meio do caminho tinha uma pedra no meio do caminho tinha uma pedra. Nunca esquecerão desse acontecimento na vida de minhas retinas, os vi tão fatigados. Nunca me esquecerei que no meio do caminho tinha uma pedra Eu era uma pedra no meio do caminho no meio do caminho eu era uma pedra.","rating":7.8},{"title":"Sabiá","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-sabia.html","date":"2026-05-13","text":"Sabiá que o sabiá sabiá de mais? Soube de mais e teve alguns finais A pena foi a máxima dentre os pássaros; Teve todos os seus bens confiscados; Indo de relógios, celulares, liberdade até a vida Tudo isso por saber de mais e falar o que sabiá Pois os Urubus eram quem mandavam no local Gostavam de carniça e fez todos se alimentarem igual Mas o sabiá que sabiá oque era certo quis fazê-lo Pena dele, ficou sem pena, falecido por seu erro","rating":6.42},{"title":"Sacrifícios","author":"Lizianto Brito","href":"poesias/lizianto-brito-sacrificios.html","date":"2026-05-13","text":"Estou com o peito vazio hoje. Não porque ela me Deixou, Mas porque sinto que a Deixei. Pois ontem ela me Beijou, E de volta apenas a Beijei. Estou com o peito vazio hoje. Pelo menos a barriga tá cheia, Abri mão de momentos por isso E minha família, eu não vi crescer Os criei com papel, e de que vai valer? Se meu esforço, faz de mim um lixo Pelo menos a barriga tá cheia.","rating":5.82},{"title":"Santa princesa","author":"Antúrio Brito","href":"poesias/anturio-brito-santa-princesa.html","date":"2026-05-13","text":"Ó moça bela, saudade de te ver, faz muito tempo desde ontem. Ó linda moça o quanto eu te amo não se compara a nada. Ó linda princesa, te amo e lembro de todas suas palavras Nenhum mortal seria digno de tal beleza angelical. E se pra te tocar, eu após fosse atacado pelo guarda real Ou apedrejado pelo que no fundo tem inveja e faria igual Eu o faria pois uma vida sem morrer por ti isso sim, seria o castigo fatal","rating":6.13},{"title":"Saudade da minha ex😁","author":"Zaquel Brito","href":"poesias/zaquel-brito-saudade-da-minha-ex.html","date":"2026-05-13","text":"Tenho saudades de minha EX... Da EXaltação Do EXílio do triste De EXonerar o mal próximo Da EXimação de coisas ruins Da EXceção entre todos os cinzas Da ÊXtase de viver alegre De EXaltar a vida bela De EXagerar Pena que fiquei viúvo da minha alegria, Que levou consigo um pouco do que eu sentia Esvaziou um pouco do resto da vida leviana Levou muito de tudo, apenas resta a esperança","rating":6.14},{"title":"Se sou poeta","author":"Teodomiro Brito","href":"poesias/teodomiro-brito-se-sou-poeta.html","date":"2026-05-13","text":"Se sou poeta, eu aprendi a desabafar Tal qual um dia o bebê a engatinhar Tal qual o desesperado a engatilhar E tal qual o humano que foi respirar Se sou poeta, não sou mais que um servo E se não fosse, seria ingrato Pois algo me manda, e em mim eu preservo Me expresso, e enfim eu falo Se sou poeta, me machuco E dói muito, mas não tô de luto Vejo a dor como um presente, me expresso em arte e desenho o céu Pois um pequeno ato bom é gigante em meio ao cruel Se sou poeta sou triste E a tristeza em mim reside Suponho que o meu dia choroso seria, se a desolação me abandonasse um dia Já que melhor sua companhia do que a alma vazia, pois o poeta só existe se tiver melancolia Sobre tudo, um sentimento misto Se sou poeta, penso, logo existo","rating":6.99},{"title":"SEREIA","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-sereia.html","date":"2026-05-13","text":"Ouvi o canto da iara Canto tão lindo que me encantara E eu da praia olhei pra sereia Ela no mar e eu na areia Magnífica esta sereia de perna Apolínea, extraordinariamente bela De presença airosa, é impensável não notar Vive de forma bondosa, inexequível não gostar Apaixonante, impossível não amar","rating":6.54},{"title":"Sobre você","author":"Azaleia Brito","href":"poesias/azaleia-brito-sobre-voce.html","date":"2026-05-13","text":"E no fim é sobre você, e é sobre você porque sempre é sobre você. É sobre você, aquele momento em que eu estou morrendo de tédio com a cara na mesa querendo sumir. É sobre você, aquele momento em que tudo parece estar a milhão e minha mão fica inquieta. É sobre você, aquele choro seguido por um \"não consigo continuar\" no meio da madrugada Ainda não entendeu? Era sobre você, porque no tédio, o sorriso que apareceu em minha boca era sobre você. Era sobre você, porque o que tranquilizou a minha mão, foi escrever a sua inicial no meu braço. Era sobre você, pois, quando eu dizia não conseguir, lembrava de ti, e tinha forças pra tentar mais um pouquinho.","rating":7.88},{"title":"Sofrer","author":"Lizianto Brito","href":"poesias/lizianto-brito-sofrer.html","date":"2026-05-13","text":"Sempre me perguntaram, Ser ou não ser, e eu vos pergunto, estar vivo é viver? Vivo hoje sem saber Com falta de ciência de meu ser, Já sofri a tanto que hoje sofro e sigo a ver Ver que de tão intenso foi meu sofrer, Hoje o pouco sofrimento é apenas viver Pois em minha fuga pra não vida, eu vivo mais do que pude conceber","rating":6.38},{"title":"Sombras","author":"Lizianto Brito","href":"poesias/lizianto-brito-sombras.html","date":"2026-05-13","text":"Amanhecendo vou a rotina, calor e luz em minhas costas Em frente vejo saindo de mim as ideias e vontades opostas E então caminho com o sol a queimar todo o topo da minha cabeça, Meus traumas viram minha base, me levam e demonstram fraqueza Finalmente vejo a luz em frente e há mim o medo some Mas sei no fundo que está sempre atrás não importo onde Com o anoitecer tudo passa não existem mais medos Observo mais, e embora não sombras, traumas e escuridão é o que vejo","rating":7.62},{"title":"SONETO DO TROUXA","author":"Antúrio Brito","href":"poesias/anturio-brito-soneto-do-trouxa.html","date":"2026-05-13","text":"A forma mais pura, é a feminina Calma, bela, sincera e límpida É da mulher que a vida germina E é essa a beleza que nos ensina Ó perfeita mulher bela e fina Trás vício e energia como cafeína Me alucina tal qual mescalina Eu idolatro ela, tão divina Pena que é falsa, pura ilusão Te dediquei todo meu verão Mas tive o inverno como conclusão Mas não aceito o ponto final O transformo em reticências, afinal Eu te amo e pelo amor serei leal","rating":6.12},{"title":"Tempo","author":"Celina Brito","href":"poesias/celina-brito-tempo.html","date":"2026-05-13","text":"E o tempo? Lento, devagar, então se ele não está rápido que eu esteja feliz a cada eternidade que vivo","rating":7.11},{"title":"Traíra","author":"Ambrósia Brito","href":"poesias/ambrosia-brito-traira.html","date":"2026-05-13","text":"No oceano da existência, peixes vêm e vão sem bagagem ou mala Prob
