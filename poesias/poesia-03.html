      <h1>Mapa para voltar</h1>
      <time datetime="2026-03-18">18 mar. 2026</time>
      <div class="text-body poem">
        <p>Voltar nao e seguir o mesmo rio,<br>nem procurar a porta antiga.</p>
        <p>E reconhecer, no peito,<br>a casa que muda de lugar.</p>
        <p>Por isso desenho no ar<br>um mapa feito de escuta.</p>
      </div>
