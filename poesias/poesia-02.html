      <h1>Inventario da luz</h1>
      <time datetime="2026-02-03">03 fev. 2026</time>
      <div class="text-body poem">
        <p>Guardei numa caixa pequena<br>a luz que sobrou da manha.</p>
        <p>Quando a noite pediu meu nome,<br>abri a tampa devagar.</p>
        <p>Havia ali um sol miudo,<br>bastante para atravessar.</p>
      </div>
